<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evoker Escape</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    overflow:hidden;
    background:black;
    font-family:'Malgun Gothic', sans-serif;
}

.screen{
    width:100vw;
    height:100vh;
    position:relative;
}

.hidden{ display:none !important; }

.bg-image{
    width:100%;
    height:100%;
    object-fit:cover;
}

.start-btn{
    position:absolute;
    left:50%;
    bottom:90px;
    transform:translateX(-50%);
    width:520px;
    height:72px;
    background:#b8b8b8;
    border:3px solid #1d1d1d;
    box-shadow:
        inset 3px 3px 0 #e5e5e5,
        inset -3px -3px 0 #555,
        0 3px 0 #111;
    color:white;
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    text-shadow:2px 2px 0 #555;
}

#answerScreen{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

.answer-box{
    width:450px;
    background:#c9c9c9;
    border:4px solid #3a3a3a;
    box-shadow:
        inset 3px 3px 0 #f5f5f5,
        inset -3px -3px 0 #666;
    padding:12px;
    text-align:center;
}

.answer-title{
    font-size:28px;
    font-weight:bold;
    color:#111;
    margin-bottom:10px;
}

.inner-box{
    background:#cfcfcf;
    border:3px solid #777;
    box-shadow:
        inset 2px 2px 0 #eeeeee,
        inset -2px -2px 0 #888;
    padding:18px;
}

.answer-guide{
    font-size:22px;
    font-weight:bold;
    color:#222;
    margin-bottom:18px;
}

.answer-input{
    width:100%;
    height:58px;
    background:#0b0b0b;
    color:white;
    border:3px solid #111;
    box-shadow:
        inset 3px 3px 0 #000,
        inset -2px -2px 0 #222;
    font-size:28px;
    text-align:center;
    margin-bottom:20px;
}

.check-btn{
    width:300px;
    height:62px;
    background:#7fbd4a;
    border:4px solid #1b1b1b;
    box-shadow:
        inset 3px 3px 0 #b8e27b,
        inset -3px -3px 0 #3d6823,
        3px 3px 0 #111;
    color:white;
    font-size:30px;
    font-weight:bold;
    cursor:pointer;
    text-shadow:2px 2px 0 #444;
}

.message{
    margin-top:14px;
    font-size:20px;
    font-weight:bold;
    color:red;
}

/* 홈 버튼 */
.home-btn{
    position:absolute;
    top:28px;
    left:28px;
    width:92px;
    height:72px;
    background:#b8b8b8;
    border:3px solid #1d1d1d;
    box-shadow:
        inset 3px 3px 0 #e5e5e5,
        inset -3px -3px 0 #555,
        0 3px 0 #111;
    color:white;
    font-size:34px;
    font-weight:bold;
    cursor:pointer;
    text-shadow:2px 2px 0 #555;
    z-index:20;
}

/* 픽셀 원형 도장 */
.stamp{
    position:absolute;
    right:85px;
    bottom:70px;
    width:270px;
    height:270px;
    border:10px solid #d40000;
    border-radius:50%;
    color:#d40000;
    background:rgba(255,255,255,0.03);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-family:'Courier New', 'Malgun Gothic', monospace;
    font-size:30px;
    font-weight:900;
    line-height:1.35;
    letter-spacing:-1px;
    text-shadow:2px 2px 0 rgba(212,0,0,0.25);
    transform:rotate(-13deg) scale(0);
    opacity:0;
    z-index:15;
    image-rendering:pixelated;
}

.stamp::before{
    content:"";
    position:absolute;
    inset:18px;
    border:5px solid #d40000;
    border-radius:50%;
}

.stamp::after{
    content:"★★★★★";
    position:absolute;
    bottom:27px;
    left:0;
    width:100%;
    font-size:22px;
    letter-spacing:4px;
}

.stamp-text{
    position:relative;
    z-index:2;
    border-top:5px solid #d40000;
    border-bottom:5px solid #d40000;
    padding:13px 0;
    width:210px;
    transform:rotate(-5deg);
}

.stamp.show{
    animation:stampPop 0.65s ease-out forwards;
}

@keyframes stampPop{
    0%{ transform:rotate(-13deg) scale(2.5); opacity:0; }
    60%{ transform:rotate(-13deg) scale(0.88); opacity:1; }
    100%{ transform:rotate(-13deg) scale(1); opacity:1; }
}

/* TNT 폭발 */
#tntEffect{
    position:fixed;
    inset:0;
    z-index:50;
    background:rgba(0,0,0,0.45);
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}

#tntImg{
    width:150px;
    image-rendering:pixelated;
    animation:tntCharge 1.1s ease-in-out forwards;
}

#boomCanvas{
    position:fixed;
    inset:0;
    z-index:55;
    width:100%;
    height:100%;
    pointer-events:none;
}

.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    z-index:80;
    pointer-events:none;
}

.flash.active{ animation:whiteFlash 0.75s ease-in-out forwards; }

.shake{ animation:screenShake 0.08s infinite; }

@keyframes tntCharge{
    0%{ transform:scale(0.4); filter:brightness(1); }
    25%{ transform:scale(1.1) rotate(-5deg); filter:brightness(1.8); }
    50%{ transform:scale(1.8) rotate(5deg); filter:brightness(1); }
    75%{ transform:scale(3.2) rotate(-5deg); filter:brightness(2.6); }
    100%{ transform:scale(6.5); opacity:0; filter:brightness(4); }
}

@keyframes whiteFlash{
    0%{ opacity:0; }
    25%{ opacity:1; }
    70%{ opacity:1; }
    100%{ opacity:0; }
}

@keyframes screenShake{
    0%{ transform:translate(0,0); }
    20%{ transform:translate(-14px,8px); }
    40%{ transform:translate(12px,-9px); }
    60%{ transform:translate(-10px,-12px); }
    80%{ transform:translate(14px,8px); }
    100%{ transform:translate(0,0); }
}

#fireworks{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="introScreen" class="screen">
    <img src="images/intro-evoker.png" class="bg-image">
    <button class="start-btn" onclick="startGame()">시작하기</button>
</div>

<div id="answerScreen" class="screen hidden">
    <div class="answer-box">
        <div class="answer-title">정답 입력</div>
        <div class="inner-box">
            <div class="answer-guide">정답을 입력하세요!</div>
            <input type="text" id="answerInput" class="answer-input" autocomplete="off">
            <button class="check-btn" onclick="checkAnswer()">확인</button>
            <div id="message" class="message"></div>
        </div>
    </div>
</div>

<div id="winScreen" class="screen hidden">
    <img src="images/win.png" class="bg-image">
    <canvas id="fireworks"></canvas>

    <button class="home-btn" onclick="goHome()">⌂</button>

    <div id="stamp" class="stamp">
        <div class="stamp-text">
            게임요원에게<br>
            도장을<br>
            받아가세요
        </div>
    </div>
</div>

<div id="tntEffect" class="hidden">
    <img id="tntImg" src="images/tnt.png">
</div>

<canvas id="boomCanvas"></canvas>
<div id="flash" class="flash"></div>

<script>
const ANSWER = "1789";
let fireworkTimer = null;
let fireworkAnimation = null;

function startGame(){
    showTntExplosion(function(){
        document.getElementById("introScreen").classList.add("hidden");
        document.getElementById("answerScreen").classList.remove("hidden");
        document.getElementById("answerInput").focus();
    });
}

function checkAnswer(){
    const userAnswer = document.getElementById("answerInput").value.trim();

    if(userAnswer === ANSWER){
        document.getElementById("answerScreen").classList.add("hidden");
        document.getElementById("winScreen").classList.remove("hidden");

        document.getElementById("stamp").classList.remove("show");
        setTimeout(() => {
            document.getElementById("stamp").classList.add("show");
        }, 400);

        startFireworks();
    }else{
        document.getElementById("message").innerText = "정답이 아닙니다!";
    }
}

function goHome(){
    stopFireworks();

    document.getElementById("winScreen").classList.add("hidden");
    document.getElementById("answerScreen").classList.add("hidden");
    document.getElementById("introScreen").classList.remove("hidden");

    document.getElementById("answerInput").value = "";
    document.getElementById("message").innerText = "";
    document.getElementById("stamp").classList.remove("show");
}

document.getElementById("answerInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") checkAnswer();
});

function showTntExplosion(nextStep){
    const tntEffect = document.getElementById("tntEffect");
    const tntImg = document.getElementById("tntImg");
    const flash = document.getElementById("flash");

    tntEffect.classList.remove("hidden");
    document.body.classList.add("shake");

    tntImg.style.animation = "none";
    void tntImg.offsetWidth;
    tntImg.style.animation = "tntCharge 1.1s ease-in-out forwards";

    setTimeout(function(){ createBombExplosion(); }, 850);
    setTimeout(function(){ flash.classList.add("active"); }, 1150);

    setTimeout(function(){
        tntEffect.classList.add("hidden");
        document.body.classList.remove("shake");
        nextStep();
    }, 1500);

    setTimeout(function(){ flash.classList.remove("active"); }, 1900);
}

function createBombExplosion(){
    const canvas = document.getElementById("boomCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    for(let i = 0; i < 180; i++){
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 15 + 5;
        const size = Math.random() * 12 + 5;
        const colors = ["#ff4500","#ff8c00","#ffd000","#ffffff","#333333","#555555","#111111"];

        pieces.push({
            x:centerX,
            y:centerY,
            vx:Math.cos(angle) * speed,
            vy:Math.sin(angle) * speed,
            size:size,
            life:60 + Math.random() * 25,
            color:colors[Math.floor(Math.random() * colors.length)]
        });
    }

    function animateExplosion(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        pieces.forEach((p,index)=>{
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.35;
            p.vx *= 0.97;
            p.vy *= 0.97;
            p.life--;

            ctx.globalAlpha = Math.max(p.life / 70, 0);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);

            if(p.life <= 0) pieces.splice(index,1);
        });

        ctx.globalAlpha = 1;

        if(pieces.length > 0){
            requestAnimationFrame(animateExplosion);
        }else{
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }
    }

    animateExplosion();
}

function startFireworks(){
    stopFireworks();

    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function createFirework(){
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height * 0.45 + 80;
        const colors = ["#ff3333", "#ffff33", "#33ff66", "#33ccff", "#ff66ff", "#ffffff"];

        for(let i = 0; i < 80; i++){
            particles.push({
                x:x,
                y:y,
                angle:Math.random() * Math.PI * 2,
                speed:Math.random() * 5 + 2,
                radius:Math.random() * 3 + 2,
                life:100,
                color:colors[Math.floor(Math.random() * colors.length)]
            });
        }
    }

    function animateFireworks(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p, index) => {
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;
            p.y += 0.04;
            p.life--;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            if(p.life <= 0) particles.splice(index, 1);
        });

        fireworkAnimation = requestAnimationFrame(animateFireworks);
    }

    createFirework();
    fireworkTimer = setInterval(createFirework, 700);
    animateFireworks();
}

function stopFireworks(){
    if(fireworkTimer){
        clearInterval(fireworkTimer);
        fireworkTimer = null;
    }

    if(fireworkAnimation){
        cancelAnimationFrame(fireworkAnimation);
        fireworkAnimation = null;
    }

    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
